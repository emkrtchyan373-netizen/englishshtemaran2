<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>English Grammar Quiz – Section 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050505;
    --card: rgba(20, 25, 30, 0.85);
    --ink: #e0e6ed;
    --muted: #8b9bb4;
    --accent: #00f3ff;
    --accent-light: rgba(0, 243, 255, 0.15);
    --correct: #00ff66;
    --correct-light: rgba(0, 255, 102, 0.15);
    --wrong: #ff003c;
    --wrong-light: rgba(255, 0, 60, 0.15);
    --border: #1a2333;
    --glow-shadow: 0 0 15px rgba(0, 243, 255, 0.4), 0 0 30px rgba(0, 243, 255, 0.2);
    --correct-glow: 0 0 15px rgba(0, 255, 102, 0.4);
    --wrong-glow: 0 0 15px rgba(255, 0, 60, 0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--bg);
    background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 0, 60, 0.05), transparent 25%),
        linear-gradient(rgba(5, 5, 5, 0.9), rgba(5, 5, 5, 0.9)),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0, 243, 255, 0.03) 40px, rgba(0, 243, 255, 0.03) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0, 243, 255, 0.03) 40px, rgba(0, 243, 255, 0.03) 41px);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }
  header { text-align: center; margin-bottom: 32px; animation: fadeDown 0.6s ease both; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); letter-spacing: -0.5px; color: #fff; text-shadow: 0 0 10px rgba(0,243,255,0.6); }
  header p { margin-top: 8px; color: var(--accent); font-size: 0.97rem; text-shadow: 0 0 5px rgba(0,243,255,0.3); }

  /* ── START SCREEN ── */
  #start-screen {
    width: 100%; max-width: 520px; text-align: center;
    animation: fadeUp 0.5s ease both;
  }
  .start-card {
    background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(15px);
    border-radius: 20px; padding: 40px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
  }
  .start-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .start-card h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 12px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .start-card p { color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .mode-btn {
    padding: 16px 12px; border-radius: 14px; border: 1px solid var(--border);
    background: rgba(10,15,20,0.6); cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem; font-weight: 600; color: var(--muted);
    transition: all 0.2s; text-align: center; position: relative; overflow: hidden;
  }
  .mode-btn:hover { border-color: var(--accent); background: var(--accent-light); color: #fff; box-shadow: inset 0 0 10px rgba(0,243,255,0.2); }
  .mode-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); box-shadow: var(--glow-shadow); text-shadow: 0 0 5px var(--accent); }
  .mode-btn .mode-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; display: block; margin-bottom: 4px; color: #fff; }
  .range-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
  .range-row label { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  .range-row input[type=number] {
    flex:1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; background: rgba(10,15,20,0.8);
    transition: all 0.2s;
  }
  .range-row input[type=number]:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,243,255,0.4); }

  /* ── QUIZ ── */
  #quiz-panel { display: none; width: 100%; max-width: 640px; }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .top-bar .q-counter { font-size: 0.85rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .top-bar .score-pill {
    background: var(--accent-light); color: var(--accent); font-weight: 700;
    font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(0,243,255,0.3);
    box-shadow: 0 0 8px rgba(0,243,255,0.2);
  }
  .progress-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 99px; height: 6px; margin-bottom: 24px; overflow: hidden; border: 1px solid var(--border); }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent); }
  .question-card {
    background: #ffffff; border: 1px solid #e4e2dc; border-radius: 20px;
    padding: 28px 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: fadeUp 0.35s ease both;
    position: relative;
  }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .q-body {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.3vw, 1.22rem); color: #000;
    line-height: 1.6; margin-bottom: 24px; white-space: pre-line;
  }
  .options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    width: 100%; text-align: left; padding: 13px 16px;
    border-radius: 12px; border: 1px solid #cbd5e1;
    background: #f8fafc; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; color: #0f172a; cursor: pointer;
    transition: all 0.2s; font-weight: 500;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); color: #000; box-shadow: inset 0 0 10px rgba(0,243,255,0.2); }
  .option-btn.correct { border-color: var(--correct); background: var(--correct-light); color: #16a34a; box-shadow: var(--correct-glow); text-shadow: none; font-weight: bold; }
  .option-btn.wrong   { border-color: var(--wrong);   background: var(--wrong-light);   color: #dc2626; box-shadow: var(--wrong-glow); text-shadow: none; font-weight: bold; }
  .option-btn:disabled { cursor: default; }
  .feedback {
    margin-top: 16px; padding: 12px 16px; border-radius: 12px;
    font-size: 0.93rem; font-weight: 500; display: none; text-align: center;
  }
  .feedback.correct { background: var(--correct-light); color: var(--correct); display: block; border: 1px solid rgba(0,255,102,0.3); text-shadow: 0 0 5px var(--correct); box-shadow: 0 0 10px rgba(0,255,102,0.2); }
  .feedback.wrong   { background: var(--wrong-light);   color: var(--wrong);   display: block; border: 1px solid rgba(255,0,60,0.3); text-shadow: 0 0 5px var(--wrong); box-shadow: 0 0 10px rgba(255,0,60,0.2); }
  .btn-row { margin-top: 24px; display: flex; gap: 12px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 24px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .btn-primary { background: var(--accent); color: #000; box-shadow: var(--glow-shadow); }
  .btn-primary:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px var(--accent); }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); box-shadow: 0 0 8px rgba(0,243,255,0.2); }
  .btn-outline:hover { background: var(--accent-light); box-shadow: var(--glow-shadow); text-shadow: 0 0 5px var(--accent); }

  /* ── RESULT ── */
  #result-panel { display: none; width: 100%; max-width: 500px; text-align: center; animation: fadeUp 0.5s ease both; }
  .result-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(15px);
    padding: 44px 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); position: relative;
  }
  .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .score-circle {
    width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--accent-light); border: 2px solid var(--accent);
    box-shadow: inset 0 0 20px rgba(0,243,255,0.2), var(--glow-shadow);
  }
  .score-circle .sn { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: var(--accent); line-height: 1; text-shadow: 0 0 10px var(--accent); }
  .score-circle .ss { font-size: 0.72rem; color: #fff; font-weight: 600; text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }
  .result-card h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 10px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .result-card .subtitle { color: var(--muted); margin-bottom: 12px; font-size: 0.97rem; }
  .stat-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
  .stat-item { text-align: center; }
  .stat-item .sv { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; text-shadow: 0 0 8px currentColor; }
  .stat-item .sl { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 4px; }
  .sv.green { color: var(--correct); }
  .sv.red { color: var(--wrong); }
  .sv { color: #fff; }

  @keyframes fadeDown { from { opacity:0; transform: translateY(-18px); } to { opacity:1; transform: none; } }
  @keyframes fadeUp   { from { opacity:0; transform: translateY(16px); }  to { opacity:1; transform: none; } }

  /* ՏԵՂԱԴՐԻՐ <style> ԲԱԺՆԻ ՎԵՐՋՈՒՄ */
  .sections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 30px;
  }

  .section-btn {
      padding: 24px 16px;
      background: rgba(15, 20, 30, 0.7);
      color: var(--accent);
      border: 1px solid rgba(0, 243, 255, 0.3);
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.15rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
  }
  
  .section-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, transparent, rgba(0, 243, 255, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
  }

  .section-btn:hover {
      transform: translateY(-4px);
      box-shadow: var(--glow-shadow);
      border-color: var(--accent);
      color: #fff;
      text-shadow: 0 0 5px var(--accent);
  }
  
  .section-btn:hover::before { opacity: 1; }

  /* Թաքցնում ենք Header-ը և Start Screen-ը սկզբնական պահին */
  header, #start-screen {
      display: none;
  }
</style>
</head>
<body>
<div id="section-menu" class="container">
    <h1 style="text-align: center; color: #fff; text-shadow: 0 0 10px rgba(0,243,255,0.6); font-family: 'Playfair Display', serif; margin-bottom: 30px;">English Grammar Sections</h1>
    <div class="sections-grid">
<script>
    for(let i = 2; i <= 13; i++) {
        // Օգտագործիր այս տողը՝ ուշադիր լինելով չակերտներին
        document.write(`<button class="section-btn" onclick="selectSection(${i})">Section ${i}</button>`);
    }
</script>
    </div>
</div>

<div id="quiz-flow-container">
    <header id="main-header">
        <h1>English Grammar Quiz</h1>
        <p id="section-label">Section · 300 Questions</p>
    </header>

    <div id="start-screen" style="display: none;">
        <div class="start-card">
            <h2>Choose Your Mode</h2>
            <p>Select how many questions you want to practice, or set a custom range.</p>
            <div class="mode-grid">
                <button class="mode-btn selected" onclick="selectMode(this,1,10)">
                    <span class="mode-num">10</span>Quick Test
                </button>
                <button class="mode-btn" onclick="selectMode(this,1,25)">
                    <span class="mode-num">25</span>Short Quiz
                </button>
                <button class="mode-btn" onclick="selectMode(this,1,50)">
                    <span class="mode-num">50</span>Medium Quiz
                </button>
                <button class="mode-btn" onclick="selectMode(this,1,300)">
                    <span class="mode-num">300</span>Full Section
                </button>
            </div>
            <div class="range-row">
                <label>From Q#</label>
                <input type="number" id="range-from" min="1" max="300" value="1"/>
                <label>To Q#</label>
                <input type="number" id="range-to" min="1" max="300" value="10"/>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="startQuiz()">▶ Start Quiz</button>
        </div>
    </div>
</div>


<!-- QUIZ -->
<div id="quiz-panel" class="container" style="display: none;">
  <div class="top-bar">
    <span class="q-counter" id="q-counter"></span>
    <span class="score-pill" id="score-pill">✓ 0</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div class="question-card">
    <div class="q-body" id="q-body"></div>
    <ul class="options-list" id="options-list"></ul>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Next →</button>
      <button class="btn btn-outline" onclick="backToStart()">✕ Quit</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-panel" style="display:none">
  <div class="result-card">
    <div class="score-circle">
      <span class="sn" id="final-pct"></span>
      <span class="ss">score</span>
    </div>
    <h2 id="result-title"></h2>
    <p class="subtitle" id="result-msg"></p>
    <div class="stat-row">
      <div class="stat-item"><div class="sv green" id="stat-correct"></div><div class="sl">Correct</div></div>
      <div class="stat-item"><div class="sv red"   id="stat-wrong"></div><div class="sl">Wrong</div></div>
      <div class="stat-item"><div class="sv"       id="stat-total"></div><div class="sl">Total</div></div>
    </div>
    <div class="btn-row" style="justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="retryQuiz()">↺ Retry Same</button>
      <button class="btn btn-outline" onclick="backToStart()">⚙ New Quiz</button>
    </div>
  </div>
</div>
<script src="questions3.js"></script>
<script src="questions5.js"></script>
<script src="questions6.js"></script>
<script src="questions8.js"></script>
<script src="questions11.js"></script>
<script>

    // Քո հիմնական ֆունկցիան կաշխատի այսպես.
function selectSection(num) {
    const DATA = {
        3: typeof SECTION_3_DATA !== 'undefined' ? SECTION_3_DATA : null,
        5: typeof SECTION_5_DATA !== 'undefined' ? SECTION_5_DATA : null,
        6: typeof SECTION_6_DATA !== 'undefined' ? SECTION_6_DATA : null,
        8: typeof SECTION_8_DATA !== 'undefined' ? SECTION_8_DATA : null,
        11: typeof SECTION_11_DATA !== 'undefined' ? SECTION_11_DATA : null,
    };

    if (DATA[num]) {
        QUESTIONS = DATA[num].questions;
        ANSWERS = DATA[num].answers;
        currentSection = num;

        document.getElementById('section-menu').style.display = 'none';
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('start-screen').style.display = 'block';
        document.getElementById('section-label').textContent = `Section ${num} · ${QUESTIONS.length} Questions`;
        
        document.getElementById('range-from').value = 1;
        document.getElementById('range-to').value = QUESTIONS.length;
    } else {
        alert("This section is not ready yet. Coming soon!");
    }
}

// ── STATE ──
let QUESTIONS = [];
let ANSWERS = [];
let quizQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let missedQuestions = [];
let currentSection = null;
let hasRevealedMissed = false;

function selectMode(btn, f, t) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('range-from').value = f;
    document.getElementById('range-to').value = t;
}

function startQuiz() {
    let from = parseInt(document.getElementById('range-from').value);
    let to = parseInt(document.getElementById('range-to').value);

    let maxAvailable = QUESTIONS.length;
    from = Math.max(1, Math.min(maxAvailable, from));
    to = Math.max(from, Math.min(maxAvailable, to));

    quizQuestions = [];
    missedQuestions = [];
    for (let i = from - 1; i < to; i++) {
        quizQuestions.push(i);
    }

    currentIdx = 0;
    score = 0;

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('main-header').style.display = 'none';
    document.getElementById('quiz-panel').style.display = 'block';
    showQuestion();
}

function checkStatement(btn, optIdx) {
    const qi = quizQuestions[currentIdx];
    const isCorrect = ANSWERS[qi][optIdx];

    if (isCorrect) {
        btn.classList.add('correct');
        score++;
        document.getElementById('score-pill').textContent = `✓ ${score}`;
    } else {
        btn.classList.add('wrong');
        if (!missedQuestions.includes(qi + 1)) {
            missedQuestions.push(qi + 1);
        }
    }

    btn.disabled = true;
}

function showQuestion() {
    answered = false;
    hasRevealedMissed = false;
    const qi = quizQuestions[currentIdx];
    const q = QUESTIONS[qi];

    document.getElementById('q-counter').textContent = `Question ${currentIdx + 1} of ${quizQuestions.length} (Q${qi + 1})`;
    document.getElementById('score-pill').textContent = `✓ ${score}`;
    document.getElementById('progress-bar').style.width = `${(currentIdx / quizQuestions.length) * 100}%`;
    document.getElementById('q-body').textContent = q.q;
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('feedback').textContent = '';

    const ol = document.getElementById('options-list');

    // Ստուգում ենք՝ արդյոք սա Section 8-ն է
    if (currentSection === 6 || currentSection === 8 || currentSection === 11) {
        // Section 8-ի համար ցույց ենք տալիս Next կոճակը անմիջապես
        document.getElementById('next-btn').style.display = 'inline-flex';
        document.getElementById('next-btn').textContent = 'Check & Next →';
        
        ol.innerHTML = q.opts.map((opt, i) =>
            `<li><button class="option-btn" onclick="checkStatement(this,${i})">${i + 1}) ${opt}</button></li>`
        ).join('');
    } else {
        // Section 3 և 5-ի համար (սովորական տրամաբանություն)
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('next-btn').textContent = 'Next →';
        const labels = ['A', 'B', 'C', 'D'];
        ol.innerHTML = q.opts.map((opt, i) =>
            `<li><button class="option-btn" onclick="selectAnswer(this,${i})">${labels[i]}) ${opt}</button></li>`
        ).join('');
    }
}
function selectAnswer(btn, idx) {
    if (answered) return;
    answered = true;
    const qi = quizQuestions[currentIdx];
    const correct = ANSWERS[qi];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    if (idx === correct) {
        btn.classList.add('correct');
        score++;
        showFeedback('correct', '✓ Correct!');
    } else {
        btn.classList.add('wrong');
        btns[correct].classList.add('correct');
        missedQuestions.push(qi + 1);
        showFeedback('wrong', `✗ Wrong! Correct answer: ${['A', 'B', 'C', 'D'][correct]}) ${QUESTIONS[qi].opts[correct]}`);
    }

    if (currentIdx < quizQuestions.length - 1) {
        document.getElementById('next-btn').style.display = 'inline-flex';
    } else {
        setTimeout(showResult, 1000);
    }
}

function showFeedback(type, msg) {
    const fb = document.getElementById('feedback');
    fb.className = `feedback ${type}`;
    fb.textContent = msg;
}

function nextQuestion() {
    if ((currentSection === 6 || currentSection === 8 || currentSection === 11) && !hasRevealedMissed) {
        const qi = quizQuestions[currentIdx];
        const correctOptions = ANSWERS[qi];
        const btns = document.querySelectorAll('.option-btn');
        let missedCorrect = false;

        btns.forEach((btn, i) => {
            if (correctOptions[i]) {
                if (!btn.classList.contains('correct')) {
                    btn.classList.add('correct');
                    btn.style.boxShadow = 'inset 0 0 10px rgba(0, 255, 102, 0.4)';
                    btn.style.opacity = '0.8';
                    missedCorrect = true;
                }
            }
            btn.disabled = true;
        });

        if (missedCorrect) {
            showFeedback('wrong', 'You missed some correct options!');
            if (!missedQuestions.includes(qi + 1)) {
                missedQuestions.push(qi + 1);
            }
        } else {
            let clickedWrong = false;
            btns.forEach((btn) => {
                if (btn.classList.contains('wrong')) clickedWrong = true;
            });
            if (clickedWrong) {
                showFeedback('wrong', 'You selected some incorrect options!');
            } else {
                showFeedback('correct', 'Perfect! You found all correct options.');
            }
        }

        hasRevealedMissed = true;
        document.getElementById('next-btn').textContent = 'Next Question →';
        return;
    }

    if (currentIdx < quizQuestions.length - 1) {
        currentIdx++;
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-panel').style.display = 'none';
    document.getElementById('result-panel').style.display = 'block';

    const pct = Math.round((score / quizQuestions.length) * 100);
    document.getElementById('final-pct').textContent = pct + "%";
    document.getElementById('stat-correct').textContent = score;
    document.getElementById('stat-wrong').textContent = quizQuestions.length - score;
    document.getElementById('stat-total').textContent = quizQuestions.length;

    document.getElementById('result-title').textContent = pct >= 80 ? "Excellent!" : "Not bad!";

    let msg = `You answered ${score} out of ${quizQuestions.length} correctly.`;
    if (missedQuestions.length > 0) {
        msg += `<br><small style="color:red">Mistakes on questions: ${missedQuestions.join(', ')}</small>`;
    }
    document.getElementById('result-msg').innerHTML = msg;
}

function backToStart() {
    document.getElementById('quiz-panel').style.display = 'none';
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('main-header').style.display = 'none';
    document.getElementById('section-menu').style.display = 'block';
}

function retryQuiz() {
    document.getElementById('result-panel').style.display = 'none';
    startQuiz();
}

</script>
